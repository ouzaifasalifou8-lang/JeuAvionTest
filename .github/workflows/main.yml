name: Compilation APK Flutter

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

            # Modifier uniquement cette étape :
      - name: Generer la configuration du projet
        run: flutter create . --platforms=android --project-name=jeu_avion
        
      # On télécharge les dépendances
      - name: Telecharger les dependances
        run: flutter pub get

      - name: Compiler APK de Debug
        run: flutter build apk --debug

      - name: Sauvegarder l'APK genere
        uses: actions/upload-artifact@v4
        with:
          name: JeuAvion-Debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
